services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    # Sin mapeo de puertos al host: solo accesible desde la red interna de Docker.
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: laria_db
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?Define MONGO_USERNAME en .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Define MONGO_PASSWORD en .env}

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      DB_PROVIDER: mongodb
      MONGODB_URL: mongodb://${MONGO_USERNAME:?}:${MONGO_PASSWORD:?}@mongodb:27017/?authSource=admin
      MONGODB_DB_NAME: laria_db
      SECRET_KEY: ${SECRET_KEY:?Define SECRET_KEY en .env (openssl rand -hex 32)}
      IA_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Define OPENAI_API_KEY en .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      DEBUG: "false"
      ENABLE_DOCS: ${ENABLE_DOCS:-true}

volumes:
  mongo_data:
